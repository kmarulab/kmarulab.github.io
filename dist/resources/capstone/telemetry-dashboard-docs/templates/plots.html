<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indy 500 Fuel Cell Detailed Plots</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .plots-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 1.5rem;
            padding: 1.5rem;
            flex: 1;
            height: calc(100vh - 100px); /* Fill space below header */
        }
        .plot-card {
            display: flex;
            flex-direction: column;
        }
        .plot-card h3 {
            margin-top: 0;
            margin-bottom: 0.5rem;
            font-size: 1rem;
            text-align: center;
        }
        .chart-wrapper {
            position: relative;
            flex: 1;
            width: 100%;
        }
        .back-link {
            text-decoration: none;
            color: var(--accent-cyan);
            font-family: var(--font-heading);
            border: 1px solid var(--accent-cyan);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .back-link:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 10px var(--accent-cyan);
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <header class="top-bar glass-panel" style="margin-bottom: 0;">
        <div class="logo">
            <h1>H2 CORE <span class="hydrogen-text">PLOTS</span></h1>
        </div>
        <div>
            <a href="/" class="back-link">⬅ BACK TO DASHBOARD</a>
        </div>
        <div class="status-indicator">
            <div class="dot pulse"></div>
            <span>CARRTHMORE LIVE TELEMETRY</span>
        </div>
    </header>

    <main class="plots-grid">
        <!-- 6 individual plots -->
        <div class="glass-panel plot-card">
            <h3>Ambient Temperature (°C)</h3>
            <div class="chart-wrapper">
                <canvas id="chart-amb-temp"></canvas>
            </div>
        </div>
        <div class="glass-panel plot-card">
            <h3>Stack Temperature (°C)</h3>
            <div class="chart-wrapper">
                <canvas id="chart-stack-temp"></canvas>
            </div>
        </div>
        <div class="glass-panel plot-card">
            <h3>Stack Voltage (V)</h3>
            <div class="chart-wrapper">
                <canvas id="chart-stack-v"></canvas>
            </div>
        </div>
        <div class="glass-panel plot-card">
            <h3>Stack Current (A)</h3>
            <div class="chart-wrapper">
                <canvas id="chart-stack-i"></canvas>
            </div>
        </div>
        <div class="glass-panel plot-card">
            <h3>Stack Power (kW)</h3>
            <div class="chart-wrapper">
                <canvas id="chart-stack-p"></canvas>
            </div>
        </div>
        <div class="glass-panel plot-card">
            <h3>Battery Voltage (V)</h3>
            <div class="chart-wrapper">
                <canvas id="chart-bat-v"></canvas>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/plots.js"></script>
</body>
</html>
